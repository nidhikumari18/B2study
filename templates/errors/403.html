{% extends "base.html" %}

{% block title %}403 - Access Forbidden{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6 text-center">
            <h1 class="display-1 fw-bold text-warning">403</h1>
            <h2 class="h3 mb-3">Access Denied</h2>
            <p class="text-muted mb-4">You don't have permission to access this resource.</p>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                <i class="bi bi-house"></i> Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
