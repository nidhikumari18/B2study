{% extends "base.html" %}

{% block title %}Login - B2Study{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-book-half" style="font-size: 3rem; color: #0d6efd;"></i>
                        <h1 class="h3 mt-3 fw-bold">B2Study</h1>
                        <p class="text-muted">School Study Platform</p>
                    </div>

                    <form method="POST" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-500">Email Address</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-500">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 fw-bold">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted mb-0">
                        Don't have an account?
                        <a href="{{ url_for('signup') }}" class="text-decoration-none fw-bold text-primary">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
