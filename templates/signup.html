{% extends "base.html" %}

{% block title %}Sign Up - B2Study{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-book-half" style="font-size: 3rem; color: #0d6efd;"></i>
                        <h1 class="h3 mt-3 fw-bold">Create Account</h1>
                        <p class="text-muted">Join B2Study Today</p>
                    </div>

                    <form method="POST" novalidate>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label fw-500">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="enrollment_number" class="form-label fw-500">Enrollment No. (Optional)</label>
                                <input type="text" class="form-control" id="enrollment_number" name="enrollment_number" placeholder="e.g., STU001">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-500">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="batch" class="form-label fw-500">Batch (Optional)</label>
                                <input type="text" class="form-control" id="batch" name="batch" placeholder="e.g., 2024-2028">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="branch" class="form-label fw-500">Branch (Optional)</label>
                                <input type="text" class="form-control" id="branch" name="branch" placeholder="e.g., CSE">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-500">Phone (Optional)</label>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+91-98765-43210">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-500">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="At least 6 characters" minlength="6" required>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-500">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 fw-bold">
                            <i class="bi bi-check-circle"></i> Create Account
                        </button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted mb-0">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold text-primary">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
